<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片视频轮播展示</title>

<!-- 腾讯云 CloudBase Web SDK -->
<script src="https://static.cloudbase.net/cloudbase-js-sdk/1.7.2/cloudbase.full.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 20px;
    overflow-x: hidden;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
  }
  .empty-state__icon { font-size: 56px; opacity: 0.5; }
  .empty-state__text { font-size: 18px; color: rgba(255,255,255,0.5); }
  .empty-state__link {
    color: #7eb8ff; text-decoration: none; font-size: 15px;
    padding: 10px 24px; border-radius: 22px;
    border: 1px solid rgba(126,184,255,0.3); transition: all 0.25s;
  }
  .empty-state__link:hover { background: rgba(126,184,255,0.1); border-color: rgba(126,184,255,0.6); }

  .carousel-container { display: none; width: 100%; flex-direction: column; align-items: center; gap: 14px; }
  .carousel-container.visible { display: flex; }

  .carousel {
    position: relative; width: min(92vw, 960px); aspect-ratio: 16 / 9;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    background: #1a1a2e;
  }

  .carousel__track {
    display: flex; height: 100%;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    will-change: transform;
  }

  .carousel__slide {
    flex: 0 0 100%; height: 100%; position: relative;
    display: flex; align-items: center; justify-content: center;
    background: #0a0a16;
  }

  .carousel__slide img, .carousel__slide video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  .carousel__video-icon {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 48px; opacity: 0.35; pointer-events: none; z-index: 2;
    transition: opacity 0.3s; text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .carousel__slide.playing .carousel__video-icon { opacity: 0; }

  .carousel__label {
    position: absolute; bottom: 40px; left: 16px; font-size: 12px;
    color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px); padding: 3px 10px; border-radius: 10px;
    max-width: calc(100% - 32px); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; pointer-events: none; z-index: 3;
  }

  .carousel__media-type {
    position: absolute; top: 16px; left: 16px; font-size: 11px;
    padding: 2px 8px; border-radius: 8px; background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px); color: rgba(255,255,255,0.6);
    pointer-events: none; z-index: 3;
  }

  .carousel__sound-btn {
    position: absolute; bottom: 40px; right: 16px;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px); color: #fff; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 10; transition: background 0.2s, border-color 0.2s; letter-spacing: 1px;
  }
  .carousel__sound-btn:hover { background: rgba(0,0,0,0.75); border-color: rgba(255,255,255,0.6); }

  .carousel__arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
    color: #fff; font-size: 22px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.3s, transform 0.2s; z-index: 10;
  }
  .carousel__arrow:hover { background: rgba(255,255,255,0.25); transform: translateY(-50%) scale(1.08); }
  .carousel__arrow:active { transform: translateY(-50%) scale(0.95); }
  .carousel__arrow--left  { left: 16px; }
  .carousel__arrow--right { right: 16px; }

  .carousel__dots { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
  .carousel__dot {
    width: 10px; height: 10px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.35); cursor: pointer; transition: all 0.3s ease; padding: 0;
  }
  .carousel__dot.active { background: #fff; width: 28px; border-radius: 5px; box-shadow: 0 0 12px rgba(255,255,255,0.4); }
  .carousel__dot:hover:not(.active) { background: rgba(255,255,255,0.6); }

  .carousel__progress {
    position: absolute; bottom: 0; left: 0; height: 3px;
    background: rgba(255,255,255,0.5); z-index: 10; transition: width 0.1s linear; width: 0;
  }

  .admin-link { font-size: 12px; color: rgba(255,255,255,0.3); text-decoration: none; transition: color 0.2s; }
  .admin-link:hover { color: rgba(255,255,255,0.6); }

  .fullscreen-btn {
    position: absolute; top: 16px; right: 16px; width: 36px; height: 36px;
    border-radius: 50%; border: none; background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px); color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; z-index: 10;
    transition: background 0.2s;
  }
  .fullscreen-btn:hover { background: rgba(0,0,0,0.55); }

  @media (max-width: 640px) {
    body { padding: 10px; gap: 12px; }
    .carousel { width: 96vw; aspect-ratio: 4/3; border-radius: 10px; }
    .carousel__arrow { width: 36px; height: 36px; font-size: 16px; }
    .carousel__arrow--left  { left: 8px; }
    .carousel__arrow--right { right: 8px; }
    .carousel__dots { bottom: 10px; gap: 8px; }
    .carousel__dot { width: 8px; height: 8px; }
    .carousel__dot.active { width: 22px; }
    .carousel__label { bottom: 32px; left: 8px; font-size: 10px; }
    .carousel__media-type { top: 10px; left: 10px; font-size: 10px; }
    .carousel__video-icon { font-size: 36px; }
    .carousel__sound-btn { bottom: 32px; right: 10px; width: 30px; height: 30px; font-size: 11px; }
    .fullscreen-btn { top: 10px; right: 10px; width: 30px; height: 30px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="empty-state" id="emptyState">
  <div class="empty-state__icon" id="emptyStateIcon">⏳</div>
  <div class="empty-state__text" id="emptyStateText">正在加载图片…</div>
  <a class="empty-state__link" href="admin.html">📷 前往管理页上传</a>
</div>

<div class="carousel-container" id="carouselContainer">
  <div class="carousel" id="carousel">
    <div class="carousel__track" id="carouselTrack"></div>
    <button class="carousel__arrow carousel__arrow--left"  id="prevBtn" aria-label="上一张">‹</button>
    <button class="carousel__arrow carousel__arrow--right" id="nextBtn" aria-label="下一张">›</button>
    <div class="carousel__dots" id="carouselDots"></div>
    <div class="carousel__progress" id="progressBar"></div>
    <button class="fullscreen-btn" id="fullscreenBtn" title="全屏">⛶</button>
  </div>
  <a class="admin-link" href="admin.html">📷 管理图片/视频</a>
</div>

<script src="cloudbase-config.js"></script>
<script>
// ===== CloudBase 初始化（展示页匿名登录，只读）=====
// 注：1.7.2 SDK 中 storage 方法直接挂在 app 上（app.uploadFile/app.deleteFile/app.getTempFileURL）
const db = app.database();
const COLLECTION = 'images';

// 在空状态区显示云端连接错误
function showCloudError(e) {
  const icon = document.getElementById('emptyStateIcon');
  const text = document.getElementById('emptyStateText');
  if (icon) icon.textContent = '⚠️';
  const msg = (e && e.message) ? e.message : '未知错误';
  if (text) text.textContent = '数据加载失败：' + msg + '\n请刷新页面重试';
  emptyState.style.display = '';
  carouselContainer.classList.remove('visible');
}

// base64 直接可用，无需转换；此函数保留为透传以兼容调用
async function resolveUrls(items) { return items; }

// 从数据库快照提取 item 列表（含 id，按 createdAt 升序）
function snapToList(snap) {
  return (snap.docs || []).map(d => {
    const data = d.data ? d.data() : d;
    const id = data._id || d.id;
    return Object.assign({}, data, { id });
  }).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
}

// ===== 轮播逻辑 =====
const AUTO_INTERVAL = 3000;
let images = [];
let currentIndex = 0;
let autoTimer = null;
let videoProgressTimer = null;
let isTransitioning = false;
let currentVideo = null;
let soundEnabled = false;

const emptyState       = document.getElementById('emptyState');
const carouselContainer= document.getElementById('carouselContainer');
const carousel         = document.getElementById('carousel');
const track            = document.getElementById('carouselTrack');
const prevBtn          = document.getElementById('prevBtn');
const nextBtn          = document.getElementById('nextBtn');
const dotsContainer    = document.getElementById('carouselDots');
const progressBar      = document.getElementById('progressBar');
const fullscreenBtn    = document.getElementById('fullscreenBtn');

function stopCurrentVideo() {
  if (currentVideo) {
    currentVideo.pause();
    currentVideo.currentTime = 0;
    currentVideo = null;
    const slide = document.querySelector('.carousel__slide.playing');
    if (slide) slide.classList.remove('playing');
  }
  if (videoProgressTimer) { clearInterval(videoProgressTimer); videoProgressTimer = null; }
}

function playVideo(videoEl) {
  stopCurrentVideo();
  currentVideo = videoEl;
  const slide = videoEl.parentElement;

  videoEl.muted = !soundEnabled;
  const soundBtn = slide.querySelector('.carousel__sound-btn');
  if (soundBtn) {
    soundBtn.textContent = soundEnabled ? 'ON' : 'OFF';
    soundBtn.title = soundEnabled ? '点击静音' : '点击开启声音';
  }

  slide.classList.add('playing');
  const icon = slide.querySelector('.carousel__video-icon');
  if (icon) icon.style.display = 'none';

  videoEl.currentTime = 0;
  videoEl.onended = null;

  const tryPlay = () => {
    videoEl.play().then(() => {
      slide.classList.add('playing');
      if (icon) icon.style.display = 'none';
      if (videoProgressTimer) clearInterval(videoProgressTimer);
      videoProgressTimer = setInterval(() => {
        if (videoEl.duration && videoEl.duration > 0) {
          progressBar.style.transition = 'none';
          progressBar.style.width = (videoEl.currentTime / videoEl.duration * 100) + '%';
        }
      }, 100);
      videoEl.onended = () => { stopCurrentVideo(); next(); };
    }).catch(() => {
      slide.classList.remove('playing');
      if (icon) {
        icon.style.display = ''; icon.style.pointerEvents = 'auto';
        icon.style.cursor = 'pointer'; icon.title = '点击开始播放';
        const clickToStart = () => {
          icon.style.pointerEvents = 'none'; icon.style.cursor = '';
          icon.style.display = 'none';
          icon.removeEventListener('click', clickToStart);
          videoEl.play().then(() => {
            slide.classList.add('playing');
            if (videoProgressTimer) clearInterval(videoProgressTimer);
            videoProgressTimer = setInterval(() => {
              if (videoEl.duration && videoEl.duration > 0) {
                progressBar.style.transition = 'none';
                progressBar.style.width = (videoEl.currentTime / videoEl.duration * 100) + '%';
              }
            }, 100);
            videoEl.onended = () => { stopCurrentVideo(); next(); };
          }).catch(() => {});
        };
        icon.addEventListener('click', clickToStart);
      }
    });
  };

  if (videoEl.readyState >= 2) { tryPlay(); }
  else { videoEl.addEventListener('canplay', tryPlay, { once: true }); videoEl.load(); }
}

function startImageTimer() {
  stopAutoPlay();
  resetProgressBar();
  autoTimer = setInterval(next, AUTO_INTERVAL);
}

function buildCarousel(imgList) {
  stopAutoPlay();
  stopCurrentVideo();
  track.innerHTML = '';
  dotsContainer.innerHTML = '';
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  images = imgList;
  currentIndex = 0;

  if (images.length === 0) {
    const icon = document.getElementById('emptyStateIcon');
    const text = document.getElementById('emptyStateText');
    if (icon) icon.textContent = '🖼️';
    if (text) text.textContent = '暂无图片或视频';
    emptyState.style.display = '';
    carouselContainer.classList.remove('visible');
    return;
  }

  emptyState.style.display = 'none';
  carouselContainer.classList.add('visible');

  images.forEach((item, i) => {
    const slide = document.createElement('div');
    slide.className = 'carousel__slide';
    const isVideo = item.mediaType === 'video';

    if (isVideo) {
      const videoEl = document.createElement('video');
      videoEl.src = item.url;
      videoEl.muted = true;
      videoEl.autoplay = true;
      videoEl.playsInline = true;
      videoEl.preload = 'auto';
      videoEl.loop = false;
      videoEl.setAttribute('playsinline', '');
      videoEl.setAttribute('webkit-playsinline', '');
      videoEl.setAttribute('autoplay', '');
      videoEl.setAttribute('x5-video-player-type', 'h5');
      videoEl.style.width = '100%'; videoEl.style.height = '100%'; videoEl.style.objectFit = 'cover';
      slide.appendChild(videoEl);

      // 声音按钮
      const soundBtn = document.createElement('button');
      soundBtn.className = 'carousel__sound-btn';
      soundBtn.textContent = 'OFF';
      soundBtn.title = '点击开启声音';
      soundBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        soundEnabled = !soundEnabled;
        localStorage.setItem('carousel_sound_enabled', soundEnabled ? 'true' : 'false');
        document.querySelectorAll('.carousel__sound-btn').forEach(b => {
          b.textContent = soundEnabled ? 'ON' : 'OFF';
          b.title = soundEnabled ? '点击静音' : '点击开启声音';
        });
        if (currentVideo) {
          currentVideo.muted = !soundEnabled;
          if (soundEnabled && currentVideo.paused) {
            currentVideo.currentTime = currentVideo.currentTime || 0;
            currentVideo.play().catch(() => {});
          }
        }
      });
      slide.appendChild(soundBtn);

      const icon = document.createElement('div');
      icon.className = 'carousel__video-icon';
      icon.textContent = '▶';
      icon.style.pointerEvents = 'none';
      slide.appendChild(icon);
    } else {
      const imgEl = document.createElement('img');
      imgEl.src = item.url;
      imgEl.alt = item.name || '图片';
      imgEl.loading = i === 0 ? 'eager' : 'lazy';
      slide.appendChild(imgEl);
    }

    if (item.name) {
      const label = document.createElement('div');
      label.className = 'carousel__label';
      label.textContent = (isVideo ? '🎬 ' : '') + item.name;
      slide.appendChild(label);
    }

    const typeTag = document.createElement('div');
    typeTag.className = 'carousel__media-type';
    typeTag.textContent = isVideo ? '🎬 视频' : '📷 图片';
    slide.appendChild(typeTag);

    track.appendChild(slide);
  });

  // 圆点
  images.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'carousel__dot';
    dot.setAttribute('aria-label', `第 ${i + 1} 个`);
    dot.addEventListener('click', () => goToSlide(i));
    dotsContainer.appendChild(dot);
  });

  // 末尾克隆第一张实现无缝循环
  if (images.length > 1) {
    const clone = track.children[0].cloneNode(true);
    clone.classList.add('carousel__slide--clone');
    track.appendChild(clone);
  }

  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';
  updateDots();
  track.offsetHeight;
  track.style.transition = '';
  afterSlideChange();
}

function goToSlide(index) {
  const hasClone = images.length > 1 && track.children.length > images.length;
  const maxIndex = hasClone ? images.length : images.length - 1;
  if (isTransitioning || index === currentIndex || images.length === 0) return;
  if (index < 0 || index > maxIndex) return;

  isTransitioning = true;
  stopAutoPlay();
  stopCurrentVideo();

  const goingToClone = hasClone && index === images.length;
  currentIndex = index;
  track.style.transform = `translateX(-${index * 100}%)`;
  updateDots();

  if (goingToClone) {
    setTimeout(() => {
      track.style.transition = 'none';
      currentIndex = 0;
      track.style.transform = 'translateX(0)';
      updateDots();
      track.offsetHeight;
      track.style.transition = '';
      isTransitioning = false;
      afterSlideChange(images[0]);
    }, 500);
  } else {
    setTimeout(() => {
      isTransitioning = false;
      afterSlideChange(images[index]);
    }, 500);
  }
}

function afterSlideChange(item) {
  if (!item) item = images[currentIndex];
  if (!item) return;
  const slide = track.children[currentIndex];
  if (!slide) return;

  if (item.mediaType === 'video') {
    const videoEl = slide.querySelector('video');
    if (videoEl) playVideo(videoEl);
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
  } else {
    startImageTimer();
  }
}

function prev() {
  if (images.length === 0) return;
  if (currentIndex === 0) {
    isTransitioning = true;
    stopAutoPlay();
    stopCurrentVideo();
    track.style.transition = 'none';
    currentIndex = images.length - 1;
    track.style.transform = `translateX(-${currentIndex * 100}%)`;
    updateDots();
    track.offsetHeight;
    track.style.transition = '';
    setTimeout(() => {
      isTransitioning = false;
      afterSlideChange(images[currentIndex]);
    }, 50);
  } else {
    goToSlide(currentIndex - 1);
  }
}

function next() {
  if (images.length === 0) return;
  const hasClone = track.children.length > images.length;
  if (hasClone && currentIndex === images.length - 1) {
    goToSlide(images.length);
  } else {
    goToSlide((currentIndex + 1) % images.length);
  }
}

function updateDots() {
  const displayIndex = currentIndex >= images.length ? 0 : currentIndex;
  document.querySelectorAll('.carousel__dot').forEach((d, i) => {
    d.classList.toggle('active', i === displayIndex);
  });
}

function resetProgressBar() {
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  progressBar.offsetHeight;
  progressBar.style.transition = `width ${AUTO_INTERVAL}ms linear`;
  progressBar.style.width = '100%';
}

function startAutoPlay() {
  stopAutoPlay();
  const item = images[currentIndex];
  if (!item || item.mediaType === 'video') return;
  if (images.length > 1) autoTimer = setInterval(next, AUTO_INTERVAL);
}

function stopAutoPlay() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

// 全屏
fullscreenBtn.addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else carousel.requestFullscreen().catch(() => {});
});

document.addEventListener('fullscreenchange', () => {
  setTimeout(() => {
    if (images.length > 0) {
      stopAutoPlay();
      stopCurrentVideo();
      afterSlideChange(images[currentIndex]);
    }
  }, 150);
});

// 箭头/键盘
prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);

document.addEventListener('keydown', e => {
  if (images.length === 0) return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prev(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
});

// 悬停暂停
carousel.addEventListener('mouseenter', () => {
  const item = images[currentIndex];
  if (item && item.mediaType === 'video') {
    if (currentVideo) { currentVideo.pause(); if (videoProgressTimer) { clearInterval(videoProgressTimer); videoProgressTimer = null; } }
  } else {
    stopAutoPlay();
    const w = getComputedStyle(progressBar).width;
    progressBar.style.transition = 'none';
    progressBar.style.width = w;
  }
});
carousel.addEventListener('mouseleave', () => {
  const item = images[currentIndex];
  if (item && item.mediaType === 'video') {
    if (currentVideo) {
      currentVideo.play().catch(() => {});
      if (videoProgressTimer) clearInterval(videoProgressTimer);
      videoProgressTimer = setInterval(() => {
        if (currentVideo && currentVideo.duration) {
          progressBar.style.transition = 'none';
          progressBar.style.width = (currentVideo.currentTime / currentVideo.duration * 100) + '%';
        }
      }, 100);
    }
  } else {
    startAutoPlay();
    progressBar.style.transition = `width ${AUTO_INTERVAL}ms linear`;
    progressBar.style.width = '100%';
  }
});

// 触屏
let touchStartX = 0;
carousel.addEventListener('touchstart', e => {
  if (images.length === 0) return;
  touchStartX = e.changedTouches[0].screenX;
  const item = images[currentIndex];
  if (item && item.mediaType === 'video') { if (currentVideo) currentVideo.pause(); }
  else { stopAutoPlay(); }
}, { passive: true });
carousel.addEventListener('touchend', e => {
  if (images.length === 0) return;
  const diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
  else {
    const item = images[currentIndex];
    if (item && item.mediaType === 'video') { if (currentVideo) currentVideo.play().catch(() => {}); }
    else { startAutoPlay(); }
  }
});
carousel.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

// 首次交互激活
let firstInteractionHandled = false;
function onFirstInteraction() {
  if (firstInteractionHandled) return;
  firstInteractionHandled = true;
  if (images.length > 0) {
    stopAutoPlay();
    stopCurrentVideo();
    afterSlideChange(images[currentIndex]);
  }
}
['click','touchstart','keydown'].forEach(evt => {
  document.addEventListener(evt, onFirstInteraction, { once: true });
});

// ===== CloudBase 实时监听（数据库变更立即同步）=====
async function renderFromSnap(snap) {
  const list = await resolveUrls(snapToList(snap));
  buildCarousel(list);
}

// ===== 启动：匿名登录后开启实时监听 =====
soundEnabled = localStorage.getItem('carousel_sound_enabled') === 'true';
(async () => {
  try {
    const auth = app.auth({ persistence: 'local' });
    await auth.signInAnonymously();
    db.collection(COLLECTION).orderBy('createdAt', 'asc').watch({
      onChange: renderFromSnap,
      onError: err => { console.error('[CloudBase] watch 失败:', err); showCloudError(err); }
    });
  } catch (e) {
    console.error('[CloudBase] 初始化失败:', e);
    showCloudError(e);
  }
})();
</script>
</body>
</html>
