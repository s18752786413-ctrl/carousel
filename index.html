<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片视频轮播展示</title>
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#0d1117;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  .box{text-align:center;padding:2rem}
  .spinner{width:42px;height:42px;border:3px solid rgba(255,255,255,0.15);border-top-color:#4a9eff;border-radius:50%;animation:sp 0.9s linear infinite;margin:0 auto 18px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .tip{font-size:14px;color:rgba(255,255,255,0.6);margin-top:8px}
  a{color:#4a9eff;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <div>正在跳转到展示页…</div>
  <div class="tip">如未自动跳转，<a href="https://picture-d3gqmzg1cc85b373b-1450863885.tcloudbaseapp.com/">点这里</a></div>
</div>
<script>location.replace('https://picture-d3gqmzg1cc85b373b-1450863885.tcloudbaseapp.com/');</script>
</body>
</html>
