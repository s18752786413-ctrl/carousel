<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片轮播展示</title>
<style>
  /* ===== 全局 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 20px;
    overflow-x: hidden;
  }

  /* ===== 空状态 ===== */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
  }

  .empty-state__icon { font-size: 56px; opacity: 0.5; }
  .empty-state__text { font-size: 18px; color: rgba(255,255,255,0.5); }
  .empty-state__link {
    color: #7eb8ff;
    text-decoration: none;
    font-size: 15px;
    padding: 10px 24px;
    border-radius: 22px;
    border: 1px solid rgba(126,184,255,0.3);
    transition: all 0.25s;
  }
  .empty-state__link:hover {
    background: rgba(126,184,255,0.1);
    border-color: rgba(126,184,255,0.6);
  }

  /* ===== 轮播容器 ===== */
  .carousel-container {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .carousel-container.visible { display: flex; }

  .carousel {
    position: relative;
    width: min(92vw, 960px);
    aspect-ratio: 16 / 9;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    background: #1a1a2e;
  }

  .carousel__track {
    display: flex;
    height: 100%;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    will-change: transform;
  }

  .carousel__slide {
    flex: 0 0 100%;
    height: 100%;
    position: relative;
  }

  .carousel__slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 图片名称标签 */
  .carousel__label {
    position: absolute;
    bottom: 40px;
    left: 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    padding: 3px 10px;
    border-radius: 10px;
    max-width: calc(100% - 32px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
  }

  /* ===== 箭头 ===== */
  .carousel__arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, transform 0.2s;
    z-index: 10;
  }
  .carousel__arrow:hover { background: rgba(255,255,255,0.25); transform: translateY(-50%) scale(1.08); }
  .carousel__arrow:active { transform: translateY(-50%) scale(0.95); }
  .carousel__arrow--left  { left: 16px; }
  .carousel__arrow--right { right: 16px; }

  /* ===== 圆点 ===== */
  .carousel__dots {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .carousel__dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 0;
  }
  .carousel__dot.active {
    background: #fff;
    width: 28px;
    border-radius: 5px;
    box-shadow: 0 0 12px rgba(255,255,255,0.4);
  }
  .carousel__dot:hover:not(.active) { background: rgba(255,255,255,0.6); }

  /* ===== 进度条 ===== */
  .carousel__progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: rgba(255,255,255,0.5);
    z-index: 10;
    transition: width 0.1s linear;
  }

  /* ===== 底部管理链接 ===== */
  .admin-link {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    transition: color 0.2s;
  }
  .admin-link:hover { color: rgba(255,255,255,0.6); }

  /* ===== 全屏按钮 ===== */
  .fullscreen-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.2s;
  }
  .fullscreen-btn:hover { background: rgba(0,0,0,0.55); }

  /* ===== 响应式 ===== */
  @media (max-width: 640px) {
    body { padding: 10px; gap: 12px; }

    .carousel {
      width: 96vw;
      aspect-ratio: 4 / 3;
      border-radius: 10px;
    }

    .carousel__arrow {
      width: 36px; height: 36px;
      font-size: 16px;
    }
    .carousel__arrow--left  { left: 8px; }
    .carousel__arrow--right { right: 8px; }

    .carousel__dots { bottom: 10px; gap: 8px; }
    .carousel__dot { width: 8px; height: 8px; }
    .carousel__dot.active { width: 22px; }

    .carousel__label {
      bottom: 32px;
      left: 8px;
      font-size: 10px;
    }

    .fullscreen-btn {
      top: 10px;
      right: 10px;
      width: 30px; height: 30px;
      font-size: 14px;
    }
  }
</style>
</head>
<body>

<!-- 空状态 -->
<div class="empty-state" id="emptyState">
  <div class="empty-state__icon">🖼️</div>
  <div class="empty-state__text">暂无图片</div>
  <a class="empty-state__link" href="admin.html">📷 前往管理页上传图片</a>
</div>

<!-- 轮播容器 -->
<div class="carousel-container" id="carouselContainer">
  <div class="carousel" id="carousel">
    <div class="carousel__track" id="carouselTrack"></div>
    <button class="carousel__arrow carousel__arrow--left"  id="prevBtn" aria-label="上一张">‹</button>
    <button class="carousel__arrow carousel__arrow--right" id="nextBtn" aria-label="下一张">›</button>
    <div class="carousel__dots" id="carouselDots"></div>
    <div class="carousel__progress" id="progressBar"></div>
    <button class="fullscreen-btn" id="fullscreenBtn" title="全屏">⛶</button>
  </div>
  <a class="admin-link" href="admin.html">📷 管理图片</a>
</div>

<script>
// ============================================================
//  IndexedDB 操作
// ============================================================
const DB_NAME = 'ImageCarousel';
const DB_STORE = 'images';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      if (!req.result.objectStoreNames.contains(DB_STORE)) {
        req.result.createObjectStore(DB_STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function loadImages() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const store = tx.objectStore(DB_STORE);
    const req = store.getAll();
    req.onsuccess = () => {
      db.close();
      resolve(req.result || []);
    };
    req.onerror = () => { db.close(); reject(req.error); };
  });
}

// ============================================================
//  轮播逻辑
// ============================================================
const AUTO_INTERVAL = 3000;
let images = [];
let currentIndex = 0;
let autoTimer = null;
let isTransitioning = false;

// DOM
const emptyState      = document.getElementById('emptyState');
const carouselContainer = document.getElementById('carouselContainer');
const carousel        = document.getElementById('carousel');
const track           = document.getElementById('carouselTrack');
const prevBtn         = document.getElementById('prevBtn');
const nextBtn         = document.getElementById('nextBtn');
const dotsContainer   = document.getElementById('carouselDots');
const progressBar     = document.getElementById('progressBar');
const fullscreenBtn   = document.getElementById('fullscreenBtn');

// ---- 构建轮播 ----
function buildCarousel(imgList) {
  stopAutoPlay();
  track.innerHTML = '';
  dotsContainer.innerHTML = '';
  progressBar.style.width = '0%';
  images = imgList;
  currentIndex = 0;

  if (images.length === 0) {
    emptyState.style.display = '';
    carouselContainer.classList.remove('visible');
    return;
  }

  emptyState.style.display = 'none';
  carouselContainer.classList.add('visible');

  images.forEach((img, i) => {
    const slide = document.createElement('div');
    slide.className = 'carousel__slide';

    const imgEl = document.createElement('img');
    imgEl.src = img.url;
    imgEl.alt = img.name || '图片';
    imgEl.loading = i === 0 ? 'eager' : 'lazy';
    slide.appendChild(imgEl);

    // 名称标签
    if (img.name) {
      const label = document.createElement('div');
      label.className = 'carousel__label';
      label.textContent = img.name;
      slide.appendChild(label);
    }

    track.appendChild(slide);
  });

  // 圆点
  images.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'carousel__dot';
    dot.setAttribute('aria-label', `第 ${i + 1} 张`);
    dot.addEventListener('click', () => goToSlide(i));
    dotsContainer.appendChild(dot);
  });

  track.style.transform = 'translateX(0)';
  updateDots();
  startAutoPlay();
}

// ---- 切换 ----
function goToSlide(index) {
  if (isTransitioning || index === currentIndex || images.length === 0) return;
  if (index < 0 || index >= images.length) return;

  isTransitioning = true;
  currentIndex = index;
  track.style.transform = `translateX(-${currentIndex * 100}%)`;
  updateDots();
  resetAutoPlay();
  setTimeout(() => { isTransitioning = false; }, 500);
}

function prev() {
  if (images.length === 0) return;
  goToSlide(currentIndex - 1 < 0 ? images.length - 1 : currentIndex - 1);
}
function next() {
  if (images.length === 0) return;
  goToSlide((currentIndex + 1) % images.length);
}

function updateDots() {
  document.querySelectorAll('.carousel__dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentIndex);
  });
  resetProgressBar();
}

// ---- 自动播放 ----
function startAutoPlay() {
  stopAutoPlay();
  if (images.length > 1) {
    autoTimer = setInterval(next, AUTO_INTERVAL);
  }
}
function stopAutoPlay() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}
function resetAutoPlay() { stopAutoPlay(); startAutoPlay(); }

function resetProgressBar() {
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  progressBar.offsetHeight;
  progressBar.style.transition = `width ${AUTO_INTERVAL}ms linear`;
  progressBar.style.width = '100%';
}

// ---- 全屏 ----
fullscreenBtn.addEventListener('click', () => {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    carousel.requestFullscreen().catch(() => {});
  }
});

// ---- 事件 ----
prevBtn.addEventListener('click', prev);
nextBtn.addEventListener('click', next);

document.addEventListener('keydown', e => {
  if (images.length === 0) return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); prev(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
});

carousel.addEventListener('mouseenter', () => {
  stopAutoPlay();
  const w = getComputedStyle(progressBar).width;
  progressBar.style.transition = 'none';
  progressBar.style.width = w;
});
carousel.addEventListener('mouseleave', () => {
  if (images.length > 0) {
    startAutoPlay();
    progressBar.style.transition = `width ${AUTO_INTERVAL}ms linear`;
    progressBar.style.width = '100%';
  }
});

// 触屏
let touchStartX = 0;
carousel.addEventListener('touchstart', e => {
  if (images.length === 0) return;
  touchStartX = e.changedTouches[0].screenX;
  stopAutoPlay();
}, { passive: true });
carousel.addEventListener('touchend', e => {
  if (images.length === 0) return;
  const diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
  startAutoPlay();
});
carousel.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

// ============================================================
//  轮询 IndexedDB 检测变化
// ============================================================
let lastHash = '';

function hashImages(list) {
  return list.map(i => i.id + '|' + i.url.substring(0, 80)).join(',');
}

async function poll() {
  try {
    const list = await loadImages();
    const h = hashImages(list);
    if (h !== lastHash) {
      lastHash = h;
      buildCarousel(list);
    }
  } catch (e) { /* ignore */ }
}

// ============================================================
//  启动
// ============================================================
async function init() {
  const list = await loadImages();
  lastHash = hashImages(list);
  buildCarousel(list);
  setInterval(poll, 2000);
}

init();
</script>
</body>
</html>
